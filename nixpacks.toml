[providers]
  php = true
  node = true

[phases.setup]
  nixPkgs = ['php82', 'php82Packages.composer', 'nodejs_20', 'npm']

[phases.build]
  cmds = [
    'composer install --optimize-autoloader --no-dev --no-interaction',
    'npm install',
    'npm run build'
  ]

[start]
  cmd = 'php artisan serve --host=0.0.0.0 --port=$PORT'
